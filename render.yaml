services:
  - type: web
    name: placeprep-ai-backend
    env: python
    plan: free
    buildCommand: pip install -r "Backend PlacePrep/requirements.txt"
    startCommand: cd "Backend PlacePrep" && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11